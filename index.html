<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Calculadora Simples</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f2f2f2;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.calculadora{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
    width:260px;
}

#display{
    width:100%;
    height:50px;
    font-size:22px;
    margin-bottom:10px;
    text-align:right;
    padding:5px;
}

.botoes{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

button{
    height:50px;
    font-size:18px;
    cursor:pointer;
    border:none;
    border-radius:5px;
    background:#e0e0e0;
}

button:hover{
    background:#ccc;
}

.igual{
    background:#4CAF50;
    color:white;
}

.limpar{
    background:#f44336;
    color:white;
}
</style>
</head>

<body>

<div class="calculadora">
    <input type="text" id="display" disabled>

    <div class="botoes">
        <button onclick="adicionar('7')">7</button>
        <button onclick="adicionar('8')">8</button>
        <button onclick="adicionar('9')">9</button>
        <button onclick="adicionar('/')">/</button>

        <button onclick="adicionar('4')">4</button>
        <button onclick="adicionar('5')">5</button>
        <button onclick="adicionar('6')">6</button>
        <button onclick="adicionar('*')">*</button>

        <button onclick="adicionar('1')">1</button>
        <button onclick="adicionar('2')">2</button>
        <button onclick="adicionar('3')">3</button>
        <button onclick="adicionar('-')">-</button>

        <button onclick="adicionar('0')">0</button>
        <button onclick="adicionar('.')">.</button>
        <button class="igual" onclick="calcular()">=</button>
        <button onclick="adicionar('+')">+</button>

        <button class="limpar" onclick="limpar()" style="grid-column: span 4;">Limpar</button>
    </div>
</div>

<script>
function adicionar(valor){
    document.getElementById("display").value += valor;
}

function limpar(){
    document.getElementById("display").value = "";
}

function calcular(){
    try{
        document.getElementById("display").value =
        eval(document.getElementById("display").value);
    }catch{
        alert("Expressão inválida");
    }
}
</script>

</body>
</html>
